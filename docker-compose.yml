version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expensedb
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expensedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/expensedb
      DB_DRIVER: org.postgresql.Driver
      DB_USER: expense_user
      DB_PASSWORD: expense_pass
      JWT_SECRET: ${JWT_SECRET:-change-this-super-secret-key-in-production-min-32-chars}
      AI_CATEGORIZATION_ENABLED: ${AI_CATEGORIZATION_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

volumes:
  db-data:
