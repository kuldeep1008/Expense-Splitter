spring:
  application:
    name: expense-splitter

  # Defaults to H2 in-memory so the project runs with ZERO setup.
  # Override these via env vars (or docker-compose) to point at real Postgres.
  datasource:
    export DB_URL=jdbc:mysql://localhost:3306/expensedb
    export DB_DRIVER=com.mysql.cj.jdbc.Driver
    export DB_USER=expense_user
    export DB_PASSWORD=expense_pass

    mvn spring-boot:run
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24h

  ai:
    enabled: ${AI_CATEGORIZATION_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${AI_MODEL:claude-3-5-haiku-20241022}

logging:
  level:
    com.example.expensesplitter: INFO
